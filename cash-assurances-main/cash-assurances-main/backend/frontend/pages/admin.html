<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CASH Assurances — Administration</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="main-header">
  <div class="header-inner">
    <div class="logo">CASH <span>Assurances</span></div>
    <nav>
      <span style="color:rgba(255,255,255,0.85);font-size:13px;background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:6px">ADMIN</span>
      <a href="#" onclick="logout()" style="color:rgba(255,255,255,0.7);font-size:13px">Déconnexion</a>
    </nav>
  </div>
</header>

<div class="dashboard">
  <div class="dash-header">
    <h1>Espace Administration</h1>
    <div id="stats-bar" style="display:flex;gap:16px"></div>
  </div>

  <div class="dash-grid">
    <!-- SIDEBAR -->
    <div class="sidebar card">
      <button class="sidebar-link active" onclick="showTab('contracts',this)">
        <span class="icon">📋</span> Tous les contrats
      </button>
      <button class="sidebar-link" onclick="showTab('clients',this)">
        <span class="icon">👥</span> Clients
      </button>
    </div>

    <!-- CONTENU -->
    <div id="main-content">

      <!-- ONGLET CONTRATS -->
      <div id="tab-contracts" class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
          <h2 style="font-size:18px;color:var(--blue)">Tous les contrats</h2>
          <select id="filter-status" onchange="loadContracts()" style="padding:8px 12px;border:1.5px solid #d0dce8;border-radius:8px;font-size:13px">
            <option value="">Tous les statuts</option>
            <option value="active">Actif</option>
            <option value="pending">En attente</option>
            <option value="expired">Expiré</option>
            <option value="cancelled">Annulé</option>
          </select>
        </div>

        <!-- Cases contrats style client -->
        <div id="admin-contracts-list" class="contracts-grid">
          <p style="color:var(--muted);text-align:center;padding:40px">Chargement…</p>
        </div>
      </div>

      <!-- ONGLET CLIENTS -->
      <div id="tab-clients" class="card" style="display:none">
        <h2 style="font-size:18px;color:var(--blue);margin-bottom:20px">Liste des clients</h2>
        <div style="overflow-x:auto">
          <table class="admin-table" id="clients-table">
            <thead>
              <tr>
                <th>ID</th><th>Nom complet</th><th>Email</th>
                <th>Téléphone</th><th>Wilaya</th><th>Paiement</th>
                <th>Contrats</th><th>Inscrit le</th>
              </tr>
            </thead>
            <tbody id="clients-body">
              <tr><td colspan="8" style="text-align:center;color:var(--muted);padding:30px">Chargement…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const API   = 'http://localhost:3000/api';
const token = localStorage.getItem('token');
const user  = JSON.parse(localStorage.getItem('user') || '{}');

if (!token || (user.role !== 'admin' && user.role !== 'agent')) {
  window.location.href = 'login.html';
}

function logout() { localStorage.clear(); window.location.href = 'login.html'; }

function showTab(tab, btn) {
  ['contracts','clients'].forEach(t => {
    document.getElementById('tab-' + t).style.display = 'none';
  });
  document.querySelectorAll('.sidebar-link').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).style.display = 'block';
  btn.classList.add('active');
  if (tab === 'clients') loadClients();
}

function statusBadge(s) {
  const map = { active:'Actif', pending:'En attente', expired:'Expiré', cancelled:'Annulé' };
  return `<span class="status-badge status-${s}">${map[s]||s}</span>`;
}
function fmt(n) {
  return parseFloat(n||0).toLocaleString('fr-DZ',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' DA';
}
function fmtDate(d) { return new Date(d).toLocaleDateString('fr-DZ'); }

// ── Charger contrats ──────────────────────────────────────────
async function loadContracts() {
  const status = document.getElementById('filter-status').value;
  const url    = status
    ? `${API}/contracts/admin/all?status=${status}`
    : `${API}/contracts/admin/all`;

  const res  = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
  const data = await res.json();
  const box  = document.getElementById('admin-contracts-list');

  if (!data.data || data.data.length === 0) {
    box.innerHTML = '<p style="text-align:center;color:var(--muted);padding:40px">Aucun contrat trouvé</p>';
    return;
  }

  box.innerHTML = data.data.map(c => `
    <div class="contract-card" onclick="openContract(${c.id})">
      <div class="cc-left">
        <div class="cc-boat">⛵ ${c.boat_name}
          <span style="font-size:12px;font-weight:400;color:var(--muted)">— ${c.client_name}</span>
        </div>
        <div class="cc-number">N° ${c.policy_number}</div>
        <div class="cc-dates">📅 ${fmtDate(c.start_date)} → ${fmtDate(c.end_date)}</div>
        <div style="font-size:12px;color:var(--muted)">${c.client_email}</div>
      </div>
      <div class="cc-right">
        <div class="cc-total">${fmt(c.total_general)}</div>
        ${statusBadge(c.status)}
        <div style="display:flex;gap:6px;margin-top:6px">
          <button class="btn-secondary" style="padding:4px 10px;font-size:11px"
            onclick="event.stopPropagation();changeStatus(${c.id})">Modifier statut</button>
          <button class="btn-danger" style="padding:4px 10px;font-size:11px"
            onclick="event.stopPropagation();deleteContract(${c.id})">Supprimer</button>
        </div>
      </div>
    </div>
  `).join('');
}

// ── Charger clients ───────────────────────────────────────────
async function loadClients() {
  const res  = await fetch(`${API}/contracts/admin/clients`, { headers: { Authorization: `Bearer ${token}` } });
  const data = await res.json();
  const body = document.getElementById('clients-body');

  if (!data.data || data.data.length === 0) {
    body.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:30px">Aucun client</td></tr>';
    return;
  }
  body.innerHTML = data.data.map(c => `
    <tr>
      <td>${c.id}</td>
      <td><strong>${c.first_name} ${c.last_name}</strong></td>
      <td>${c.email}</td>
      <td>${c.phone_number}</td>
      <td>${c.wilaya}</td>
      <td>${c.preferred_payment || '—'}</td>
      <td><span style="background:var(--light);color:var(--blue);padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600">${c.total_contracts}</span></td>
      <td>${fmtDate(c.created_at)}</td>
    </tr>
  `).join('');
}

function openContract(id) {
  window.location.href = `contract-sheet.html?id=${id}`;
}

async function changeStatus(id) {
  const status = prompt('Nouveau statut :\n• active\n• pending\n• expired\n• cancelled');
  if (!status) return;
  const res  = await fetch(`${API}/contracts/${id}/status`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
    body: JSON.stringify({ status }),
  });
  const data = await res.json();
  if (data.success) { loadContracts(); }
  else alert('Erreur : ' + data.message);
}

async function deleteContract(id) {
  if (!confirm('Supprimer ce contrat définitivement ?')) return;
  const res  = await fetch(`${API}/contracts/${id}`, {
    method: 'DELETE',
    headers: { Authorization: `Bearer ${token}` },
  });
  const data = await res.json();
  if (data.success) loadContracts();
  else alert('Erreur : ' + data.message);
}

loadContracts();
</script>
</body>
</html>
