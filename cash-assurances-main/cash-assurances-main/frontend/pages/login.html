<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CASH Assurances — Connexion</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="main-header">
  <div class="header-inner">
    <div class="logo">CASH <span>Assurances</span></div>
    <nav>
      <a href="../index.html">Simulateur</a>
      <a href="login.html" class="active">Connexion</a>
      <a href="register.html">S'inscrire</a>
    </nav>
  </div>
</header>

<div class="auth-page">
  <div class="auth-card card">
    <h2>Se connecter</h2>
    <div id="alert-box"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="karim@email.com">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="btn-primary" onclick="login()">Se connecter</button>
    <p class="auth-link">Pas encore de compte ? <a href="register.html">S'inscrire</a></p>
  </div>
</div>

<script>
const API = 'http://localhost:3000/api';

function showAlert(msg, type='error') {
  document.getElementById('alert-box').innerHTML =
    `<div class="alert alert-${type}">${msg}</div>`;
}

async function login() {
  const email    = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  try {
    const res  = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!data.success) return showAlert(data.message);

    localStorage.setItem('token', data.token);
    localStorage.setItem('user',  JSON.stringify(data.user));

    if (data.user.role === 'admin' || data.user.role === 'agent')
      window.location.href = 'admin.html';
    else
      window.location.href = 'dashboard.html';

  } catch (err) {
    showAlert('Erreur serveur : ' + err.message);
  }
}
</script>
</body>
</html>
