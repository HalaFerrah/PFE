<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CASH Assurances — Inscription</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="main-header">
  <div class="header-inner">
    <div class="logo">CASH <span>Assurances</span></div>
    <nav>
      <a href="../index.html">Simulateur</a>
      <a href="login.html">Connexion</a>
      <a href="register.html" class="active">S'inscrire</a>
    </nav>
  </div>
</header>

<div class="auth-page">
  <div class="auth-card card">
    <h2>Créer mon compte</h2>
    <div id="alert-box"></div>

    <div class="form-row">
      <div class="form-group">
        <label>Nom</label>
        <input type="text" id="last_name" placeholder="Benali">
      </div>
      <div class="form-group">
        <label>Prénom</label>
        <input type="text" id="first_name" placeholder="Karim">
      </div>
    </div>

    <div class="form-group">
      <label>Adresse</label>
      <input type="text" id="address" placeholder="12 Rue des Fleurs, Bab El Oued">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Wilaya</label>
        <input type="text" id="wilaya" placeholder="Alger">
      </div>
      <div class="form-group">
        <label>Code postal</label>
        <input type="text" id="postal_code" placeholder="16000">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Téléphone</label>
        <input type="tel" id="phone_number" placeholder="0555 12 34 56">
      </div>
      <div class="form-group">
        <label>Mode de paiement</label>
        <select id="preferred_payment">
          <option value="CIB">Carte CIB</option>
          <option value="Dahabia">Dahabia</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="karim@email.com">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" id="confirm_password" placeholder="••••••••">
      </div>
    </div>

    <!-- Infos carte bancaire -->
    <h3 style="font-size:14px;color:var(--muted);margin:8px 0 12px;letter-spacing:1px;text-transform:uppercase">Carte bancaire</h3>
    <div class="form-group">
      <label>Numéro de carte</label>
      <input type="text" id="card_number" placeholder="1234 5678 9012 3456" maxlength="19">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Date d'expiration</label>
        <input type="text" id="card_expiry" placeholder="MM/AA" maxlength="5">
      </div>
      <div class="form-group">
        <label>CVC</label>
        <input type="text" id="card_cvc" placeholder="123" maxlength="3">
      </div>
    </div>

    <button class="btn-primary" onclick="register()">Créer mon compte</button>

    <p class="auth-link">Déjà un compte ? <a href="login.html">Se connecter</a></p>
  </div>
</div>

<script>
const API = 'http://localhost:3000/api';

// Format numéro de carte
document.getElementById('card_number').addEventListener('input', function(e) {
  let v = e.target.value.replace(/\D/g,'').substring(0,16);
  e.target.value = v.replace(/(.{4})/g,'$1 ').trim();
});
document.getElementById('card_expiry').addEventListener('input', function(e) {
  let v = e.target.value.replace(/\D/g,'').substring(0,4);
  if (v.length >= 2) v = v.substring(0,2) + '/' + v.substring(2);
  e.target.value = v;
});

function showAlert(msg, type='error') {
  document.getElementById('alert-box').innerHTML =
    `<div class="alert alert-${type}">${msg}</div>`;
}

async function register() {
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm_password').value;

  if (password !== confirm) return showAlert('Les mots de passe ne correspondent pas.');

  const body = {
    last_name:         document.getElementById('last_name').value,
    first_name:        document.getElementById('first_name').value,
    address:           document.getElementById('address').value,
    wilaya:            document.getElementById('wilaya').value,
    postal_code:       document.getElementById('postal_code').value,
    phone_number:      document.getElementById('phone_number').value,
    email:             document.getElementById('email').value,
    password,
    preferred_payment: document.getElementById('preferred_payment').value,
    // Token carte : en production => passer par la gateway, jamais stocker le vrai numéro
    payment_token:     'TOKEN_' + Date.now(),
  };

  try {
    const res  = await fetch(`${API}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!data.success) return showAlert(data.message);

    localStorage.setItem('token', data.token);
    localStorage.setItem('user',  JSON.stringify(data.user));
    showAlert('Compte créé avec succès ! Redirection…', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 1200);
  } catch (err) {
    showAlert('Erreur serveur : ' + err.message);
  }
}
</script>
</body>
</html>
